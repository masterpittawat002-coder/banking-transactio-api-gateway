name: CD - Publish Development

# test + trigger Render deploy hook (dev environment บน Render + Upstash Redis)
# trigger เมื่อ push เข้า branch `publish-development`
# Render connect กับ branch นี้ — GitHub Actions จะ trigger deploy hook เพื่อสั่ง Render ให้ build+deploy
#
# การตั้งค่าบน Render:
# 1. Web Service (dev) → Settings → Build & Deploy → Branch = publish-development
# 2. Web Service (dev) → Settings → Deploy Hook → copy URL มาใส่เป็น secret RENDER_DEV_DEPLOY_HOOK_URL
# 3. Web Service (dev) → Environment → ใส่ DB_*, REDIS_*, JWT_* ตรงนี้ (ไม่ต้องใส่ใน GitHub)
# 4. Pre-Deploy Command: npm run migrate
# 5. Auto-Deploy: OFF  (ควบคุมผ่าน GitHub Actions เอง)
on:
  push:
    branches: [publish-development]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/reusable-test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Trigger Render deploy hook
        run: |
          response=$(curl -fsSL -X POST "${{ secrets.RENDER_DEV_DEPLOY_HOOK_URL }}")
          echo "Render response: $response"

      - name: Wait for Render deploy to finish
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_DEV_SERVICE_ID }}
        run: |
          # poll deploy status ทุก 15 วิ สูงสุด 10 นาที
          for i in {1..40}; do
            sleep 15
            status=$(curl -fsSL \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Accept: application/json" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys?limit=1" \
              | jq -r '.[0].deploy.status')
            echo "Attempt $i: status=$status"
            case "$status" in
              live) echo "Deploy successful"; exit 0 ;;
              build_failed|update_failed|canceled|deactivated) echo "Deploy failed"; exit 1 ;;
            esac
          done
          echo "Timeout waiting for deploy"
          exit 1
