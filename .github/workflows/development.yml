name: Dev Build and Push Docker Image

on:
  push:
    branches: [publish-development]
  workflow_dispatch:  # ให้กด run เองจาก GitHub UI ได้

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write  # สำหรับ push ไป GitHub Container Registry

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ใช้ Docker Buildx (รองรับ multi-platform build + cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login เข้า GitHub Container Registry (ฟรี)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # GitHub สร้าง token นี้ให้อัตโนมัติ

      # Generate metadata (tags + labels)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=development
            type=raw,value=latest

      # Build + Push
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
