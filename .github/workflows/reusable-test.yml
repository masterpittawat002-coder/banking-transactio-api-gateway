name: Reusable Test

# reusable workflow — ถูกเรียกจาก workflow อื่นผ่าน `uses:`
on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: banking_gateway_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run migrations
        run: |
          for f in database/migrations/*.sql; do
            PGPASSWORD=postgres psql -h localhost -U postgres -d banking_gateway_test -f "$f"
          done

      # - name: Run integration tests
      #   run: npm run test:integration
      #   env:
      #     NODE_ENV: test
      #     DB_HOST: localhost
      #     DB_PORT: 5432
      #     DB_NAME: banking_gateway_test
      #     DB_USER: postgres
      #     DB_PASSWORD: postgres
      #     REDIS_HOST: localhost
      #     REDIS_PORT: 6379
      #     REDIS_PASSWORD: ''
      #     JWT_SECRET: test-secret-for-ci-only
      #     JWT_EXPIRES_IN: 15m
      #     JWT_REFRESH_EXPIRES_IN: 7d

      - name: Build
        run: npm run build
